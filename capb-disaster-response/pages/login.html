<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - CAPB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #141b2d;
            --bg-tertiary: #1a2237;
            --accent-primary: #00d9ff;
            --accent-secondary: #00a8cc;
            --accent-tertiary: #ff6b35;
            --accent-warning: #ff4757;
            --text-primary: #e6e9f0;
            --text-secondary: #a8adb8;
            --text-tertiary: #7a8089;
            --border-color: rgba(0, 217, 255, 0.15);
        }

        body {
            font-family: 'IBM Plex Sans', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #141b2d 25%, #0f1419 50%, #0a0e1a 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .card {
            background: linear-gradient(135deg, rgba(20, 27, 45, 0.9) 0%, rgba(26, 34, 55, 0.7) 100%);
            border: 1px solid var(--border-color);
            border-radius: 2px;
            padding: 2.5rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 16px 64px rgba(0, 0, 0, 0.4);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            border-radius: 2px;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-primary);
            font-weight: 900;
            font-size: 1.5rem;
            box-shadow: 0 0 24px rgba(0, 217, 255, 0.3);
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .logo-subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 300;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .tab {
            flex: 1;
            padding: 0.75rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: var(--accent-primary);
            border-bottom-color: var(--accent-primary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-input {
            width: 100%;
            padding: 0.9rem;
            background: rgba(0, 217, 255, 0.03);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 2px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            background: rgba(0, 217, 255, 0.06);
            border-color: var(--accent-primary);
            box-shadow: 0 0 16px rgba(0, 217, 255, 0.15);
        }

        .form-input::placeholder {
            color: var(--text-tertiary);
        }

        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .role-option {
            position: relative;
        }

        .role-option input {
            display: none;
        }

        .role-label {
            display: block;
            padding: 0.9rem;
            background: rgba(0, 217, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 2px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .role-option input:checked + .role-label {
            background: rgba(0, 217, 255, 0.15);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            color: var(--bg-primary);
            border: none;
            border-radius: 2px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0, 217, 255, 0.3);
        }

        .form-content {
            display: none;
        }

        .form-content.active {
            display: block;
        }

        .link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .link a {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .link a:hover {
            color: var(--accent-tertiary);
        }

        .error {
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid rgba(255, 71, 87, 0.3);
            color: #ff4757;
            padding: 0.75rem;
            border-radius: 2px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        @media (max-width: 640px) {
            .card {
                padding: 1.75rem;
            }

            .role-selector {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo-section">
                <div class="logo-icon">C</div>
                <div class="logo-text">CAPB</div>
                <div class="logo-subtitle">Emergency Response Platform</div>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Sign In</button>
                <button class="tab" onclick="switchTab('signup')">Register</button>
            </div>

            <!-- Login Form -->
            <div id="login" class="form-content active">
                <div id="login-error" class="error" style="display: none;"></div>
                
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" id="login-username" class="form-input" placeholder="Enter username" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="login-password" class="form-input" placeholder="Enter password" required>
                    </div>

                    <button type="submit" class="btn">Sign In</button>
                </form>

                <div class="link">
                    Demo Accounts<br>
                    Command / Responder / Survivor / Volunteer<br>
                    <strong>Password: 12345</strong>
                </div>
            </div>

            <!-- Signup Form -->
            <div id="signup" class="form-content">
                <div id="signup-error" class="error" style="display: none;"></div>

                <form onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="signup-name" class="form-input" placeholder="Enter full name" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Role</label>
                        <div class="role-selector">
                            <label class="role-option">
                                <input type="radio" name="role" value="command" checked>
                                <div class="role-label">Command</div>
                            </label>
                            <label class="role-option">
                                <input type="radio" name="role" value="responder">
                                <div class="role-label">Responder</div>
                            </label>
                            <label class="role-option">
                                <input type="radio" name="role" value="survivor">
                                <div class="role-label">Survivor</div>
                            </label>
                            <label class="role-option">
                                <input type="radio" name="role" value="volunteer">
                                <div class="role-label">Volunteer</div>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" id="signup-username" class="form-input" placeholder="Choose username" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="signup-password" class="form-input" placeholder="Enter password" required>
                    </div>

                    <button type="submit" class="btn">Create Account</button>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>

    <script>
        function switchTab(tab) {
            console.log('[UI] Switching to tab:', tab);
            
            document.querySelectorAll('.form-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        function handleLogin(e) {
            e.preventDefault();
            console.log('[Login] Attempting login');
            
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            console.log('[Login] Username:', username);

            const success = authManager.login(username, password);
            
            if (success) {
                const user = authManager.getUser();
                console.log('[Login] Success, redirecting to:', user.role);
                window.location.href = `./${user.role}.html`;
            } else {
                console.log('[Login] Failed');
                const errorDiv = document.getElementById('login-error');
                errorDiv.textContent = 'Invalid username or password';
                errorDiv.style.display = 'block';
                setTimeout(() => {
                    errorDiv.style.display = 'none';
                }, 3000);
            }
        }

        function handleSignup(e) {
            e.preventDefault();
            console.log('[Signup] Attempting signup');
            
            const name = document.getElementById('signup-name').value;
            const role = document.querySelector('input[name="role"]:checked').value;
            const username = document.getElementById('signup-username').value;
            const password = document.getElementById('signup-password').value;

            console.log('[Signup] Creating user:', username, role);

            const success = authManager.register(username, password, name, role);
            
            if (success) {
                console.log('[Signup] Success');
                const errorDiv = document.getElementById('signup-error');
                errorDiv.textContent = 'Account created! Please sign in.';
                errorDiv.style.background = 'rgba(16, 185, 129, 0.1)';
                errorDiv.style.borderColor = 'rgba(16, 185, 129, 0.3)';
                errorDiv.style.color = '#10b981';
                errorDiv.style.display = 'block';
                
                setTimeout(() => {
                    switchTab('login');
                    errorDiv.style.display = 'none';
                }, 2000);
            } else {
                console.log('[Signup] Failed');
                const errorDiv = document.getElementById('signup-error');
                errorDiv.textContent = 'Username already exists';
                errorDiv.style.display = 'block';
                setTimeout(() => {
                    errorDiv.style.display = 'none';
                }, 3000);
            }
        }

        console.log('[Page] Login page loaded');
    </script>
</body>
</html>
