<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Operations - CAPB</title>
    <link href='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css' rel='stylesheet' />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #141b2d;
            --bg-tertiary: #1a2237;
            --accent-primary: #00d9ff;
            --accent-secondary: #00a8cc;
            --accent-tertiary: #ff6b35;
            --accent-warning: #ff4757;
            --text-primary: #e6e9f0;
            --text-secondary: #a8adb8;
            --text-tertiary: #7a8089;
            --border-color: rgba(0, 217, 255, 0.15);
        }

        body {
            font-family: 'IBM Plex Sans', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 2rem;
            background: rgba(10, 14, 26, 0.95);
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .navbar-brand-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-primary);
            font-weight: 900;
            font-size: 0.875rem;
        }

        .btn {
            padding: 0.6rem 1.5rem;
            border: 1px solid rgba(255, 71, 87, 0.3);
            background: transparent;
            color: var(--accent-warning);
            border-radius: 1px;
            font-size: 0.8rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .btn:hover {
            background: rgba(255, 71, 87, 0.1);
        }

        .main-container {
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            gap: 1rem;
            padding: 1rem;
            height: calc(100vh - 70px);
        }

        .panel {
            background: linear-gradient(135deg, rgba(20, 27, 45, 0.8) 0%, rgba(26, 34, 55, 0.5) 100%);
            border: 1px solid var(--border-color);
            border-radius: 1px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(10, 14, 26, 0.6);
        }

        .panel-title {
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .info-box {
            background: rgba(0, 217, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 1px;
        }

        .info-label {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .info-value {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--accent-primary);
        }

        .list-item {
            background: rgba(0, 217, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 0.9rem;
            margin-bottom: 0.75rem;
            border-radius: 1px;
        }

        .list-item-title {
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 0.25rem;
        }

        .list-item-text {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        #map {
            border-radius: 1px;
            border: 1px solid var(--border-color);
        }

        .panel-content::-webkit-scrollbar {
            width: 6px;
        }

        .panel-content::-webkit-scrollbar-thumb {
            background: rgba(0, 217, 255, 0.2);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <div class="navbar-brand-icon">V</div>
            <span>Volunteer Network</span>
        </div>
        <button class="btn" onclick="handleLogout()">Logout</button>
    </nav>

    <div class="main-container">
        <!-- Left Panel: Info -->
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">Relief Centers</div>
            </div>
            <div class="panel-content">
                <div id="centers-list"></div>
            </div>
        </div>

        <!-- Center: Map -->
        <div id="map"></div>

        <!-- Right Panel: Statistics -->
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">Operations Summary</div>
            </div>
            <div class="panel-content">
                <div class="info-box">
                    <div class="info-label">Active Volunteers</div>
                    <div class="info-value" id="vol-count">0</div>
                </div>

                <div class="info-box">
                    <div class="info-label">Relief Centers</div>
                    <div class="info-value" id="center-count">0</div>
                </div>

                <div class="info-box">
                    <div class="info-label">People Helped</div>
                    <div class="info-value" id="helped-count">0</div>
                </div>

                <div style="margin-top: 1.5rem; border-top: 1px solid var(--border-color); padding-top: 1rem;">
                    <div class="panel-title" style="margin-bottom: 0.75rem; font-size: 0.75rem;">Active Operations</div>
                    <div id="operations-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js'></script>
    <script src="../js/store.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/statemanagement.js"></script>
    <script src="../js/sosdb.js"></script>
    <script src="../js/sosservice.js"></script>
    <script src="../js/sosbridge.js"></script>
    <script src="../js/map.js"></script>

    <script>
        requireRole('volunteer');

        let mapService = null;

        stateManager.subscribe((state) => {
            updateUI(state);
        });

        function updateUI(state) {
            updateLists(state);
            updateStats(state);
            if (mapService && mapService.isInitialized()) {
                updateMap(state);
            }
        }

        function updateLists(state) {
            const centersList = document.getElementById('centers-list');
            centersList.innerHTML = state.patients.map(p => `
                <div class="list-item">
                    <div class="list-item-title">${p.name}</div>
                    <div class="list-item-text">${p.condition}</div>
                </div>
            `).join('');

            const opsList = document.getElementById('operations-list');
            opsList.innerHTML = state.responders.slice(0, 3).map(r => `
                <div class="list-item">
                    <div class="list-item-title">${r.name}</div>
                    <div class="list-item-text">${r.status}</div>
                </div>
            `).join('');
        }

        function updateStats(state) {
            document.getElementById('vol-count').textContent = Math.floor(Math.random() * 50) + 20;
            document.getElementById('center-count').textContent = '3';
            document.getElementById('helped-count').textContent = state.patients.length * 10;
        }

        function updateMap(state) {
            mapService.clearMarkers();

            state.patients.forEach(p => {
                mapService.addMarker(`pat_${p.id}`,
                    [p.location.lng, p.location.lat],
                    { type: 'patient', title: p.name, severity: p.severity >= 8 ? 'critical' : 'moderate' }
                );
            });

            state.responders.forEach(r => {
                mapService.addMarker(`resp_${r.id}`,
                    [r.location.lng, r.location.lat],
                    { type: r.type, title: r.name }
                );
            });
        }

        function handleLogout() {
            authManager.logout();
            window.location.href = './login.html';
        }

        setTimeout(() => {
            mapService = new MapService('map');
            mapService.init([90.4125, 23.8103], 14, 'satellite', 'professional');
            stateManager.startSimulation();
        }, 500);

        window.addEventListener('beforeunload', () => {
            stateManager.stopSimulation();
        });
    </script>
</body>
</html>
