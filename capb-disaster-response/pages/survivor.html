<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survivor Assistance - CAPB</title>
    <link href='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css' rel='stylesheet' />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #141b2d;
            --bg-tertiary: #1a2237;
            --accent-primary: #00d9ff;
            --accent-secondary: #00a8cc;
            --accent-tertiary: #ff6b35;
            --accent-warning: #ff4757;
            --text-primary: #e6e9f0;
            --text-secondary: #a8adb8;
            --text-tertiary: #7a8089;
            --border-color: rgba(0, 217, 255, 0.15);
        }

        body {
            font-family: 'IBM Plex Sans', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 2rem;
            background: rgba(10, 14, 26, 0.95);
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .navbar-brand-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-primary);
            font-weight: 900;
            font-size: 0.875rem;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            padding: 1rem;
            height: calc(100vh - 70px);
        }

        .panel {
            background: linear-gradient(135deg, rgba(20, 27, 45, 0.8) 0%, rgba(26, 34, 55, 0.5) 100%);
            border: 1px solid var(--border-color);
            border-radius: 1px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(10, 14, 26, 0.6);
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .panel-subtitle {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            font-weight: 300;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .info-card {
            background: rgba(0, 217, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            border-radius: 1px;
            text-align: center;
        }

        .info-label {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.75rem;
        }

        .info-value {
            font-size: 2rem;
            font-weight: 900;
            color: var(--accent-primary);
        }

        .help-section {
            background: rgba(0, 217, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            border-radius: 1px;
            margin-bottom: 1.5rem;
        }

        .help-title {
            font-size: 0.95rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .nearest-unit {
            background: rgba(0, 217, 255, 0.05);
            border: 1px solid rgba(0, 217, 255, 0.3);
            padding: 1rem;
            border-radius: 1px;
            margin-bottom: 0.75rem;
        }

        .unit-name {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 0.35rem;
        }

        .unit-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            color: var(--bg-primary);
            border: none;
            border-radius: 1px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0, 217, 255, 0.3);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(255, 71, 87, 0.3);
            color: var(--accent-warning);
        }

        .btn-secondary:hover {
            background: rgba(255, 71, 87, 0.1);
        }

        #map {
            border-radius: 1px;
            border: 1px solid var(--border-color);
        }

        .panel-content::-webkit-scrollbar {
            width: 6px;
        }

        .panel-content::-webkit-scrollbar-thumb {
            background: rgba(0, 217, 255, 0.2);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <div class="navbar-brand-icon">S</div>
            <span>Survivor Support</span>
        </div>
    </nav>

    <div class="main-container">
        <!-- Left Panel -->
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">Assistance Information</div>
                <div class="panel-subtitle">Real-time emergency response tracking</div>
            </div>
            <div class="panel-content">
                <div class="info-grid">
                    <div class="info-card">
                        <div class="info-label">Nearest Unit</div>
                        <div class="info-value" id="distance-value">-</div>
                    </div>
                    <div class="info-card">
                        <div class="info-label">ETA</div>
                        <div class="info-value" id="eta-value">-</div>
                    </div>
                </div>

                <div class="help-section">
                    <div class="help-title">Available Response Units</div>
                    <div id="units-list"></div>
                </div>

                <button class="btn" onclick="handleLogout()">Logout</button>
                <button class="btn btn-secondary" onclick="window.location.href='./sos-emergency.html'">Emergency Alert</button>
            </div>
        </div>

        <!-- Right Panel: Map -->
        <div id="map"></div>
    </div>

    <script src='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js'></script>
    <script src="../js/store.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/statemanagement.js"></script>
    <script src="../js/sosdb.js"></script>
    <script src="../js/sosservice.js"></script>
    <script src="../js/sosbridge.js"></script>
    <script src="../js/map.js"></script>

    <script>
        requireRole('survivor');

        let mapService = null;
        const survivorLocation = { lat: 23.8103, lng: 90.4125 };

        stateManager.subscribe((state) => {
            updateUI(state);
        });

        function updateUI(state) {
            // if (mapService && mapService.isInitialized()) {
            //     updateMap(state);
            // }

            if (!mapService || !mapService.isInitialized()) {
                console.log("Map not ready yet...");
                return; 
            }

            updateUnitsList(state.responders);
            updateMap(state);
        }

        function updateUnitsList(responders) {
            const list = document.getElementById('units-list');

            if (!mapService) return;
            
            const nearestUnit = responders.reduce((nearest, unit) => {
                const distance = mapService.calculateDistance(
                    [survivorLocation.lng, survivorLocation.lat],
                    [unit.location.lng, unit.location.lat]
                );
                return !nearest || distance < nearest.distance ? { unit, distance } : nearest;
            }, null);

            if (nearestUnit) {
                document.getElementById('distance-value').textContent = 
                    nearestUnit.distance.toFixed(1) + ' km';
                document.getElementById('eta-value').textContent = 
                    Math.ceil(nearestUnit.distance * 2) + ' min';
            }

            list.innerHTML = responders.map(r => `
                <div class="nearest-unit">
                    <div class="unit-name">${r.name}</div>
                    <div class="unit-meta">${r.type.toUpperCase()} | Status: ${r.status}</div>
                </div>
            `).join('');
        }

        function updateMap(state) {
            mapService.clearMarkers();

            mapService.addMarker('survivor',
                [survivorLocation.lng, survivorLocation.lat],
                { type: 'patient', title: 'Your Location', severity: 'normal' }
            );

            state.responders.forEach(r => {
                mapService.addMarker(`resp_${r.id}`,
                    [r.location.lng, r.location.lat],
                    { type: r.type, title: r.name }
                );
            });
        }

        function handleLogout() {
            authManager.logout();
            window.location.href = './login.html';
        }

        setTimeout(() => {
            mapService = new MapService('map');
            mapService.init([survivorLocation.lng, survivorLocation.lat], 14, 'satellite', 'professional');
            stateManager.startSimulation();
        }, 500);

        window.addEventListener('beforeunload', () => {
            stateManager.stopSimulation();
        });
    </script>
</body>
</html>
