<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - CAPB</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <div class="navbar-brand-icon">C</div>
                <div>CAPB</div>
            </div>
        </div>
    </nav>

    <div class="hero">
        <div class="hero-background">
            <div class="hero-grid"></div>
            <div class="hero-glow hero-glow-1"></div>
        </div>

        <div style="max-width: 400px; width: 100%; position: relative; z-index: 1;">
            <div class="card animate-in">
                <h2 style="text-align: center; margin-bottom: 1rem;">Create Account</h2>
                <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Join the emergency response network</p>

                <form id="signup-form" style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" placeholder="Your full name" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" placeholder="you@example.com" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Phone</label>
                        <input type="tel" placeholder="+880 1..." class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" placeholder="Minimum 8 characters" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" placeholder="Re-enter password" class="form-input" required>
                    </div>

                    <label style="display: flex; align-items: flex-start; gap: 0.5rem; cursor: pointer; font-size: 0.875rem;">
                        <input type="checkbox" class="form-checkbox" required>
                        <span>I agree to the Terms of Service and Privacy Policy</span>
                    </label>

                    <button type="submit" class="btn btn-primary btn-lg btn-block">Create Account</button>
                </form>

                <div style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--text-muted);">
                    Already have an account? <a href="login.html" style="color: var(--primary);">Sign In</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/store.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            authManager.signup(formData.get('email'), formData.get('password'));
            window.location.href = '../pages/role-selection.html';
        });
    </script>
</body>
</html>
